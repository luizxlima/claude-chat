<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a38;
      --accent: #c084fc;
      --accent2: #818cf8;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --user-bg: #1e1b4b;
      --claude-bg: #0f172a;
      --success: #34d399;
      --error: #f87171;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(192,132,252,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(192,132,252,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .btn-clear {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-clear:hover {
      border-color: var(--error);
      color: var(--error);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.3s ease forwards;
      opacity: 0;
      transform: translateY(8px);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .message.claude .avatar {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .bubble {
      max-width: min(680px, 80%);
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.7;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(129,140,248,0.2);
      border-radius: 12px 2px 12px 12px;
    }

    .message.claude .bubble {
      background: var(--claude-bg);
      border: 1px solid var(--border);
      border-radius: 2px 12px 12px 12px;
    }

    /* Markdown styling inside bubble */
    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble code {
      background: rgba(192,132,252,0.1);
      border: 1px solid rgba(192,132,252,0.2);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      color: var(--accent);
    }
    .bubble pre {
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .bubble pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text);
    }
    .bubble strong { color: #e2e8f0; font-weight: 600; }
    .bubble em { color: var(--accent); }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 8px 0; }
    .bubble li { margin-bottom: 4px; }
    .bubble h1, .bubble h2, .bubble h3 {
      font-family: 'Syne', sans-serif;
      margin: 12px 0 6px;
      color: var(--accent);
    }
    .bubble blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      color: var(--text-muted);
      margin: 8px 0;
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: var(--claude-bg);
      border: 1px solid var(--border);
      border-radius: 2px 12px 12px 12px;
      width: fit-content;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: typing 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .welcome {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .welcome-icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }

    .welcome h2 {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 13px;
      line-height: 1.6;
      max-width: 400px;
      margin: 0 auto 24px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .suggestion {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'JetBrains Mono', monospace;
    }

    .suggestion:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    footer {
      position: relative;
      z-index: 10;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(192,132,252,0.1);
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      resize: none;
      max-height: 160px;
      min-height: 22px;
      line-height: 1.6;
    }

    #input::placeholder { color: var(--text-muted); }

    #send {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
    }

    #send:hover { opacity: 0.85; transform: scale(1.05); }
    #send:active { transform: scale(0.95); }
    #send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    #send svg { width: 16px; height: 16px; fill: white; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 10px;
    }

    .hint kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <span class="logo-text">Claude Chat</span>
  </div>
  <div class="header-actions">
    <div class="status-dot" title="Online"></div>
    <button class="btn-clear" onclick="clearChat()">limpar</button>
  </div>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <span class="welcome-icon">✦</span>
    <h2>Olá! Sou o Claude.</h2>
    <p>Posso ajudar com código, análise, escrita, perguntas e muito mais. Como posso te ajudar?</p>
    <div class="suggestions">
      <span class="suggestion" onclick="sendSuggestion('Explique como funciona uma API REST')">API REST</span>
      <span class="suggestion" onclick="sendSuggestion('Crie uma função JavaScript para ordenar uma lista')">Ordenar lista JS</span>
      <span class="suggestion" onclick="sendSuggestion('O que é Docker e para que serve?')">O que é Docker?</span>
      <span class="suggestion" onclick="sendSuggestion('Me dê dicas para melhorar performance em Node.js')">Node.js performance</span>
    </div>
  </div>
</div>

<footer>
  <div class="input-wrapper">
    <textarea
      id="input"
      placeholder="Digite sua mensagem..."
      rows="1"
      autofocus
    ></textarea>
    <button id="send" onclick="sendMessage()" title="Enviar">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <p class="hint"><kbd>Enter</kbd> envia · <kbd>Shift+Enter</kbd> nova linha</p>
</footer>

<script>
  // Generate session ID
  const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);
  let isLoading = false;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendSuggestion(text) {
    inputEl.value = text;
    sendMessage();
  }

  function hideWelcome() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
  }

  function addMessage(role, content) {
    hideWelcome();
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'claude') {
      bubble.innerHTML = formatMarkdown(content);
    } else {
      bubble.textContent = content;
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    hideWelcome();
    const div = document.createElement('div');
    div.className = 'message claude';
    div.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';

    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

    div.appendChild(avatar);
    div.appendChild(indicator);
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function removeTyping() {
    const typing = document.getElementById('typing');
    if (typing) typing.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function formatMarkdown(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
      .replace(/^\* (.+)$/gm, '<li>$1</li>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/^(?!<[hupblo])(.+)$/gm, (m) => m ? m : '')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    const message = inputEl.value.trim();
    if (!message || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMessage('user', message);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, sessionId }),
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        addMessage('claude', '⚠️ Erro: ' + data.error);
      } else {
        addMessage('claude', data.response);
      }
    } catch (err) {
      removeTyping();
      addMessage('claude', '⚠️ Erro de conexão. Tente novamente.');
    }

    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  async function clearChat() {
    await fetch('/api/clear', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId }),
    });

    messagesEl.innerHTML = `
      <div class="welcome" id="welcome">
        <span class="welcome-icon">✦</span>
        <h2>Conversa reiniciada.</h2>
        <p>Como posso te ajudar?</p>
      </div>`;
  }
</script>
</body>
</html>
